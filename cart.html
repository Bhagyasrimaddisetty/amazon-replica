<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart – ShopNow</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo"><a href="index.html"><span class="logo-shop">Shop</span><span class="logo-now">Now</span></a></div>
  <div class="nav-right">
    <div class="nav-cart active"><i class="fa fa-shopping-cart"></i> <span id="cartCount">0</span> Cart</div>
  </div>
</nav>

<div class="container cart-page">
  <h2>Shopping Cart</h2>
  <div class="cart-layout">
    <div class="cart-items" id="cartItems">
      <p class="empty-cart">Your cart is empty. <a href="index.html">Shop now</a></p>
    </div>
    <div class="cart-summary" id="cartSummary" style="display:none">
      <div class="summary-card">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
        <div class="summary-row"><span>Delivery</span><span class="free">FREE</span></div>
        <div class="summary-row total"><span>Total</span><span id="totalAmt">₹0</span></div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        <p class="secure-note"><i class="fa fa-lock"></i> Secure checkout</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
