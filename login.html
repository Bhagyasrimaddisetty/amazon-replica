<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – ShopNow</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

<div class="auth-logo">
  <a href="index.html"><span class="logo-shop">Shop</span><span class="logo-now">Now</span></a>
</div>

<div class="auth-card">
  <h2>Sign In</h2>
  <div id="authError" class="auth-error"></div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="Enter your email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="password-wrap">
      <input type="password" id="loginPassword" placeholder="Enter your password"/>
      <i class="fa fa-eye toggle-pw" onclick="togglePw('loginPassword',this)"></i>
    </div>
  </div>
  <button class="auth-btn" onclick="loginUser()">Sign In</button>

  <div class="auth-divider"><span>or</span></div>
  <button class="google-btn" onclick="loginWithGoogle()">
    <i class="fab fa-google"></i> Continue with Google
  </button>

  <p class="auth-switch">New customer? <a href="register.html">Create account</a></p>
</div>

<div class="auth-footer">
  <a href="#">Conditions of Use</a> | <a href="#">Privacy Notice</a> | <a href="#">Help</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
